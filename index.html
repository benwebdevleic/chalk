<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chalk</title>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root { --panel-width: 340px; --ease: cubic-bezier(0.4, 0, 0.2, 1); }

  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'DM Mono', monospace; }

  /* ── STAGE ── */
  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.5s var(--ease);
  }

  #slide-text {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 6vw, 5rem);
    color: #fff;
    text-align: center;
    max-width: 80%;
    line-height: 1.2;
    text-shadow: 0 2px 24px rgba(0,0,0,0.18);
    pointer-events: none;
    white-space: pre-wrap;
    transition: opacity 0.25s var(--ease), transform 0.25s var(--ease);
  }

  #slide-text.fading { opacity: 0; transform: translateY(8px); }

  /* ── COUNTER ── */
  #counter {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(255,255,255,0.4); pointer-events: none;
  }

  /* ── NAV ── */
  .nav-btn {
    position: fixed; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.12); border: none; cursor: pointer;
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.7); font-size: 1.1rem;
    transition: background 0.2s, opacity 0.2s;
    backdrop-filter: blur(4px);
  }
  .nav-btn:hover { background: rgba(255,255,255,0.25); }
  .nav-btn:disabled { opacity: 0; pointer-events: none; }
  #btn-prev { left: 20px; }
  #btn-next { right: 20px; }

  /* ── TOGGLE ── */
  #panel-toggle {
    position: fixed; top: 20px; right: 20px; z-index: 200;
    width: 38px; height: 38px; border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    backdrop-filter: blur(8px); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.85);
    transition: background 0.2s, transform 0.3s var(--ease);
    font-size: 0.9rem;
  }
  #panel-toggle:hover { background: rgba(255,255,255,0.28); }
  #panel-toggle.open { transform: rotate(180deg); }

  /* ── PANEL ── */
  #panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: var(--panel-width); background: #0f0f0f;
    border-left: 1px solid rgba(255,255,255,0.08);
    z-index: 100;
    transform: translateX(100%);
    transition: transform 0.4s var(--ease);
    display: flex; flex-direction: column; overflow: hidden;
  }
  #panel.open { transform: translateX(0); }

  #panel-header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    flex-shrink: 0;
  }
  #panel-header h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.2rem; color: #fff; font-weight: 400;
  }
  #panel-header p {
    font-size: 0.65rem; color: rgba(255,255,255,0.35);
    letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px;
  }

  /* ── SLIDE LIST ── */
  #slide-list { flex: 1; overflow-y: auto; padding: 12px 0; }
  #slide-list::-webkit-scrollbar { width: 4px; }
  #slide-list::-webkit-scrollbar-track { background: transparent; }
  #slide-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .slide-item {
    padding: 10px 20px;
    display: flex; align-items: center; gap: 10px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 0.15s, border-color 0.15s;
  }
  .slide-item:hover { background: rgba(255,255,255,0.04); }
  .slide-item.active {
    background: rgba(255,255,255,0.07);
    border-left-color: rgba(255,255,255,0.4);
  }
  .slide-swatch {
    width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .slide-preview-text {
    font-size: 0.72rem; color: rgba(255,255,255,0.6);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
  }
  .slide-delete {
    background: none; border: none; cursor: pointer;
    color: rgba(255,255,255,0.2); font-size: 1rem;
    padding: 2px 4px; border-radius: 4px; flex-shrink: 0; line-height: 1;
    transition: color 0.15s, background 0.15s;
  }
  .slide-delete:hover { color: #ff6b6b; background: rgba(255,107,107,0.1); }

  /* ── EDITOR ── */
  #editor {
    padding: 16px 20px 20px;
    border-top: 1px solid rgba(255,255,255,0.07);
    flex-shrink: 0;
  }
  #editor label {
    display: block; font-size: 0.6rem; letter-spacing: 0.12em;
    text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 6px;
  }
  textarea {
    width: 100%; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
    color: #fff; font-family: 'DM Mono', monospace; font-size: 0.82rem;
    padding: 10px 12px; resize: none; height: 72px; outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: rgba(255,255,255,0.3); }

  .color-row { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
  input[type="color"] {
    width: 44px; height: 36px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    cursor: pointer; padding: 2px; overflow: hidden;
  }
  input[type="text"] {
    flex: 1; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
    color: #fff; font-family: 'DM Mono', monospace; font-size: 0.8rem;
    padding: 8px 10px; outline: none; transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: rgba(255,255,255,0.3); }

  .swatches { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .swatch {
    width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s; flex-shrink: 0;
  }
  .swatch:hover { transform: scale(1.2); }
  .swatch.selected { border-color: rgba(255,255,255,0.8); }

  .editor-actions { display: flex; gap: 8px; margin-top: 14px; }
  .btn {
    flex: 1; padding: 9px; border-radius: 8px;
    font-family: 'DM Mono', monospace; font-size: 0.72rem;
    letter-spacing: 0.06em; cursor: pointer; border: none;
    transition: background 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: rgba(255,255,255,0.12); color: #fff; }
  .btn-primary:hover { background: rgba(255,255,255,0.2); }
  .btn-ghost {
    background: transparent; color: rgba(255,255,255,0.4);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7); }

  /* ── SHARE ── */
  #share-section {
    padding: 12px 20px 16px;
    border-top: 1px solid rgba(255,255,255,0.07); flex-shrink: 0;
  }
  #share-btn {
    width: 100%; padding: 10px;
    background: rgba(255,255,255,0.9); color: #111;
    border: none; border-radius: 8px; cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 0.75rem;
    letter-spacing: 0.08em; font-weight: 500;
    transition: background 0.2s, transform 0.1s;
  }
  #share-btn:hover { background: #fff; }
  #share-btn:active { transform: scale(0.98); }
  #new-btn {
    width: 100%; padding: 9px; margin-top: 8px;
    background: transparent; color: rgba(255,255,255,0.25);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 0.72rem;
    letter-spacing: 0.06em;
    transition: background 0.15s, color 0.15s, transform 0.1s;
  }
  #new-btn:hover { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.5); }
  #new-btn:active { transform: scale(0.98); }

  #share-feedback {
    font-size: 0.65rem; color: rgba(255,255,255,0.35);
    text-align: center; margin-top: 6px; min-height: 1em;
    letter-spacing: 0.08em;
  }

  #kb-hint {
    position: fixed; bottom: 28px; right: 20px;
    font-size: 0.6rem; color: rgba(255,255,255,0.2);
    letter-spacing: 0.1em; text-transform: uppercase;
  }

  #chalk-logo {
    position: fixed; bottom: 20px; left: 20px;
    opacity: 0.55;
    pointer-events: none;
  }
</style>
<script defer src="https://cloud.umami.is/script.js" data-website-id="c1c38e66-3345-456c-805f-263a0b352a2f"></script>
</head>
<body x-data="presentation()" x-init="init()" @keydown.window="onKey($event)">

  <!-- Stage -->
  <div id="stage" :style="{ background: currentSlide.color }">
    <div id="slide-text" :class="{ fading: fading }" x-text="currentSlide.text"></div>
  </div>

  <!-- Counter -->
  <div id="counter" x-text="`${current + 1} / ${slides.length}`"></div>

  <!-- Nav -->
  <button class="nav-btn" id="btn-prev" @click="navigate(-1)" :disabled="current === 0">&#8592;</button>
  <button class="nav-btn" id="btn-next" @click="navigate(1)"  :disabled="current === slides.length - 1">&#8594;</button>

  <!-- Panel toggle -->
  <button id="panel-toggle" :class="{ open: panelOpen }" @click="panelOpen = !panelOpen" title="Edit slides">&#9776;</button>

  <!-- Slide-out panel -->
  <div id="panel" :class="{ open: panelOpen }">

    <div id="panel-header">
      <h2>Slides</h2>
      <p>Click a slide to edit</p>
    </div>

    <!-- Slide list -->
    <div id="slide-list">
      <template x-for="(slide, i) in slides" :key="i">
        <div class="slide-item" :class="{ active: i === current }" @click="current = i">
          <div class="slide-swatch" :style="{ background: slide.color }"></div>
          <div class="slide-preview-text" x-text="slide.text || '(empty)'"></div>
          <button class="slide-delete" @click.stop="deleteSlide(i)">×</button>
        </div>
      </template>
    </div>

    <!-- Editor -->
    <div id="editor">
      <label>Text</label>
      <textarea
        x-ref="slideTextarea"
        placeholder="Type your slide text…"
        x-model="currentSlide.text">
      </textarea>

      <div class="color-row">
        <input type="color"
          :value="currentSlide.color"
          @input="setColor($event.target.value)">
        <input type="text"
          placeholder="#1a1a2e"
          x-model="hexInput"
          @input="setColor($event.target.value)">
      </div>

      <div class="swatches">
        <template x-for="preset in presets" :key="preset">
          <div
            class="swatch"
            :class="{ selected: currentSlide.color === preset }"
            :style="{ background: preset }"
            :title="preset"
            @click="setColor(preset)">
          </div>
        </template>
      </div>

      <div class="editor-actions">
        <button class="btn btn-primary" @click="addSlide()">+ Add slide</button>
        <button class="btn btn-ghost"   @click="duplicateCurrent()">Duplicate</button>
      </div>
    </div>

    <!-- Share -->
    <div id="share-section">
      <button id="share-btn" @click="copyShareLink()">Copy share link</button>
      <div id="share-feedback" x-text="shareFeedback"></div>
      <button id="new-btn" @click="newPresentation()">+ New presentation</button>
    </div>

  </div>

  <div id="kb-hint">← → arrow keys</div>


  <!-- Chalk logo -->
  <div id="chalk-logo">
    <svg width="48" height="22" viewBox="0 0 48 22" fill="none" xmlns="http://www.w3.org/2000/svg">
      <text x="0" y="17"
        font-family="DM Serif Display, serif"
        font-size="16"
        fill="rgba(255,255,255,0.9)"
        letter-spacing="0.03em">chalk</text>
    </svg>
  </div>

<script>
function presentation() {
  return {
    slides: [],
    current: 0,
    panelOpen: false,
    fading: false,
    hexInput: '',
    shareFeedback: '',

    presets: [
      '#1a1a2e','#16213e','#0f3460','#533483',
      '#2d6a4f','#1b4332','#6b2737','#7b2d00',
      '#2c2c54','#40407a','#474787','#34495e',
      '#b7472a','#c0392b','#8e44ad','#2980b9',
    ],

    get currentSlide() {
      return this.slides[this.current];
    },

    // ── Serialisation ──────────────────────────────
    encodeSlides(slides) {
      return encodeURIComponent(JSON.stringify(slides));
    },

    decodeSlides(str) {
      try {
        return JSON.parse(decodeURIComponent(str)).filter(s => s.text);
      } catch { return null; }
    },

    defaultSlides() {
      return [
        { text: `Hello world, I'm chalk! A simple presentation tool.`, color: '#1a1a2e' },
        { text: `Your entire presentation is stored in the URL. Copy the link and it's saved forever — no account, no server, nothing to lose.`, color: '#16213e' },
        { text: `Click ☰ to edit your slides.`, color: '#2d6a4f' },
      ];
    },

    // ── Lifecycle ──────────────────────────────────
    updateURL() {
      try {
        history.replaceState(null, '', `${location.pathname}?slides=${this.encodeSlides(this.slides)}`);
      } catch (e) {
        // not available in sandboxed environments
      }
    },

    init() {
      const raw = new URLSearchParams(location.search).get('slides');
      this.slides = (raw ? this.decodeSlides(raw) : null) || this.defaultSlides();
      this.hexInput = this.currentSlide.color;
      this.$watch('current', () => { this.hexInput = this.currentSlide.color; });
      this.$watch('slides', () => { this.updateURL(); }, { deep: true });
    },

    // ── Navigation ─────────────────────────────────
    navigate(dir) {
      const next = this.current + dir;
      if (next < 0 || next >= this.slides.length) return;
      this.fading = true;
      setTimeout(() => { this.current = next; this.fading = false; }, 180);
    },

    onKey(e) {
      if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') this.navigate(1);
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   this.navigate(-1);
    },

    // ── Slide management ───────────────────────────
    insertSlide(slide) {
      this.slides.splice(this.current + 1, 0, slide);
      this.current++;
    },

    addSlide() {
      this.insertSlide({ text: '', color: this.currentSlide?.color || '#1a1a2e' });
      this.$nextTick(() => this.$refs.slideTextarea.focus());
    },

    duplicateCurrent() {
      this.insertSlide({ ...this.currentSlide });
    },

    deleteSlide(i) {
      if (this.slides.length === 1) return;
      this.slides.splice(i, 1);
      if (this.current >= this.slides.length) this.current = this.slides.length - 1;
    },

    // ── Colour ─────────────────────────────────────
    setColor(val) {
      const clean = val.startsWith('#') ? val : '#' + val;
      if (/^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(clean)) {
        this.currentSlide.color = clean;
        this.hexInput = clean;
      }
    },

    // ── New presentation ───────────────────────────
    newPresentation() {
      window.open(location.pathname, '_blank');
    },

    // ── Share ──────────────────────────────────────
    copyShareLink() {
      const url = `${location.origin}${location.pathname}?slides=${this.encodeSlides(this.slides)}`;
      navigator.clipboard.writeText(url).then(() => {
        this.shareFeedback = 'Link copied to clipboard \u2713';
        setTimeout(() => this.shareFeedback = '', 2500);
      });
    },
  }
}
</script>
</body>
</html>
